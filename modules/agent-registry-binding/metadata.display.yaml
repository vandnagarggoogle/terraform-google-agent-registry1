apiVersion: blueprints.cloud.google.com/v1alpha1
kind: BlueprintMetadata
metadata:
  name: agent-registry-binding-display
  annotations:
    config.kubernetes.io/local-config: "true"
spec:
  info:
    title: Agent Registry Binding
    source:
      repo: https://github.com/vandnagarggoogle/terraform-google-agent-registry.git
      sourceType: git
      dir: /modules/agent-registry-binding
  ui:
    input:
      variables:
        auth_provider:
          name: auth_provider
          title: Auth Provider
        binding_id:
          name: binding_id
          title: Binding Id
        description:
          name: description
          title: Description
        display_name:
          name: display_name
          title: Display Name
        location:
          name: location
          title: Location
        project_id:
          name: project_id
          title: Project Id
        source_identifier:
          name: source_identifier
          title: Source Identifier
        target_identifier:
          name: target_identifier
          title: Target Identifier
