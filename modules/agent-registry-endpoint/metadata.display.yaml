apiVersion: blueprints.cloud.google.com/v1alpha1
kind: BlueprintMetadata
metadata:
  name: terraform-google-agent-registry-agent-registry-endpoint-display
  annotations:
    config.kubernetes.io/local-config: "true"
spec:
  info:
    title: Agent Registry Endpoint
    source:
      repo: https://github.com/vandnagarggoogle/terraform-google-agent-registry1.git
      sourceType: git
      dir: /modules/agent-registry-endpoint
  ui:
    input:
      variables:
        endpoint_id:
          name: endpoint_id
          title: Endpoint Id
        filter:
          name: filter
          title: Filter
        location:
          name: location
          title: Location
        project_id:
          name: project_id
          title: Project Id
    runtime:
      outputs:
        endpoint_display_name:
          visibility: VISIBILITY_ROOT
        endpoint_urn:
          visibility: VISIBILITY_ROOT
