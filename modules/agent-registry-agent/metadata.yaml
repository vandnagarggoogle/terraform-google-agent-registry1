apiVersion: blueprints.cloud.google.com/v1alpha1
kind: BlueprintMetadata
metadata:
  name: terraform-google-agent-registry-agent-registry-agent
  annotations:
    config.kubernetes.io/local-config: "true"
spec:
  info:
    title: Agent Registry Agent
    source:
      repo: https://github.com/vandnagarggoogle/terraform-google-agent-registry1.git
      sourceType: git
      dir: /modules/agent-registry-agent
    version: 0.1.5
    actuationTool:
      flavor: Terraform
      version: ">= 0.13"
    description: {}
    icon: assets/icon.png
  content:
    examples:
      - name: agent-registry-agent
        location: examples/agent-registry-agent
      - name: agent-registry-endpoint
        location: examples/agent-registry-endpoint
      - name: agent-registry-mcp-server
        location: examples/agent-registry-mcp-server
      - name: agent-registry-service
        location: examples/agent-registry-service
  interfaces:
    variables:
      - name: project_id
        description: The ID of the project in which the resource belongs.
        varType: string
        required: true
      - name: location
        description: The location of the Agent Registry resource (e.g., us-central1).
        varType: string
        required: true
      - name: filter
        description: A filter string to find the Agent (e.g., 'display_name="my-agent"').
        varType: string
        connections:
          - source:
              source: github.com/GoogleCloudPlatform/terraform-google-agent-registry//modules/agent-registry-service
              version: ">= v0.0.8"
            spec:
              outputExpr: discovery_filter
      - name: agent_id
        description: The system-generated ID for a registered agent.
        varType: string
    outputs:
      - name: agent_display_name
        description: The display name of the Agent.
      - name: agent_framework
        description: The OSS agent framework used to develop the agent.
      - name: agent_id
        description: The agent id.
      - name: agent_protocols
        description: The connection details and interfaces for the Agent.
      - name: agent_skills
        description: The list of skills and capabilities defined for the Agent.
      - name: agent_version
        description: The version of the Agent.
      - name: last_updated
        description: The last time the agent metadata was updated.
      - name: agent_urn
        description: The logical URN of the agent.
        type: string
  requirements:
    roles:
      - level: Project
        roles:
          - roles/iam.serviceAccountUser
          - roles/config.agent
          - roles/storage.admin
          - roles/networkservices.admin
          - roles/networksecurity.admin
          - roles/serviceusage.serviceUsageAdmin
    services:
      - agentregistry.googleapis.com
      - apphub.googleapis.com
      - cloudresourcemanager.googleapis.com
      - serviceusage.googleapis.com
      - storage-api.googleapis.com
    providerVersions:
      - source: hashicorp/google-beta
        version: ">= 7.21.0"
      - source: hashicorp/google-nightly
        version: 0.1.5.0.3
