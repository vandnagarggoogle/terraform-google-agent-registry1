apiVersion: blueprints.cloud.google.com/v1alpha1
kind: BlueprintMetadata
metadata:
  name: terraform-google-agent-registry
  annotations:
    config.kubernetes.io/local-config: "true"
spec:
  info:
    title: terraform-google-agent-registry
    source:
      repo: https://github.com/vandnagarggoogle/terraform-google-agent-registry.git
      sourceType: git
    version: 0.2.6
    actuationTool:
      flavor: Terraform
      version: ">= 1.3"
    description:
      tagline: Terraform module for managing Google Cloud Agent Registry
      detailed: This module simplifies and automates the management of AI agent definitions and Model Context Protocol (MCP) servers to assert tool capabilities and manage secure discovery. It facilitates the orchestrated usage of tools within the Agentic ecosystem by providing a single source of truth for all deployed agents.
      preDeploy: "To deploy this blueprint, the following prerequisites must be met in the target Google Cloud project:"
    icon: assets/icon.png
    costEstimate:
      description: Blueprint cost details
      url: https://cloud.google.com/products/calculator?id=02fb0c45-cc29-4567-8cc6-f72ac9024add
  content:
    architecture:
      diagramUrl: https://www.link-to-architecture-diagram.com
      description:
        - 1. Architecture description step no. 1
        - 2. Architecture description step no. 2
        - 3. Architecture description step no. N
    documentation:
      - title: Hosting a Static Website
        url: https://cloud.google.com/storage/docs/hosting-static-website
    subBlueprints:
      - name: agent-registry-agent
        location: modules/agent-registry-agent
      - name: agent-registry-endpoint
        location: modules/agent-registry-endpoint
      - name: agent-registry-mcp-server
        location: modules/agent-registry-mcp-server
      - name: agent-registry-service
        location: modules/agent-registry-service
    examples:
      - name: agent-registry-agent
        location: examples/agent-registry-agent
      - name: agent-registry-endpoint
        location: examples/agent-registry-endpoint
      - name: agent-registry-mcp-server
        location: examples/agent-registry-mcp-server
      - name: agent-registry-service
        location: examples/agent-registry-service
  interfaces: {}
  requirements:
    roles:
      - level: Project
        roles:
          - roles/iam.serviceAccountUser
          - roles/config.agent
          - roles/storage.admin
          - roles/networkservices.admin
          - roles/networksecurity.admin
          - roles/serviceusage.serviceUsageAdmin
    services:
      - cloudresourcemanager.googleapis.com
      - storage-api.googleapis.com
      - serviceusage.googleapis.com
    providerVersions:
      - source: hashicorp/google
        version: ">= 6.6.0, < 8"
      - source: hashicorp/google-beta
        version: ">= 6.6.0, < 8"
      - source: hashicorp/google-nightly
        version: 0.2.6.25.0
